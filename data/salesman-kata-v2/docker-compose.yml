services:
  postgres:
    image: postgres:18-alpine
    container_name: electromart-postgres
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: electromart
      POSTGRES_PASSWORD: electromart123
      POSTGRES_DB: electromart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data-sources/postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U electromart -d electromart"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - electromart-network

  postgres-data-generator:
    build:
      context: ./data-sources/postgresql
      dockerfile: Dockerfile
    container_name: electromart-postgres-generator
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: electromart
      DB_PASSWORD: electromart123
      DB_NAME: electromart
    networks:
      - electromart-network

  minio:
    image: minio/minio:latest
    container_name: electromart-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_NOTIFY_WEBHOOK_ENABLE_csv: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_csv: "http://csv-connector-source:8085/minio/events"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - electromart-network

  minio-init:
    image: minio/mc:latest
    container_name: electromart-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c '
      sleep 5
      mc alias set myminio http://minio:9000 minioadmin minioadmin123
      mc mb --ignore-existing myminio/sales-csv
      mc mb --ignore-existing myminio/sales-csv-processed
      mc event add myminio/sales-csv arn:minio:sqs::csv:webhook --event put --suffix .csv
      echo "MinIO bucket and webhook configured"
      exit 0
      '
    environment:
      MC_HOST_myminio: http://minioadmin:minioadmin123@minio:9000
    networks:
      - electromart-network

  csv-files:
    build:
      context: ./data-sources/csv-files
      dockerfile: Dockerfile
    container_name: electromart-csv-files
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: sales-csv
      MINIO_USE_SSL: "false"
      GENERATION_INTERVAL: 5000
      RECORDS_PER_FILE: 5
    networks:
      - electromart-network

  soap-service:
    build:
      context: ./data-sources/soap
      dockerfile: Dockerfile
    container_name: electromart-soap
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - electromart-network

  kafka:
    image: apache/kafka:3.7.1
    container_name: electromart-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: electromart-kafka-cluster-01
      KAFKA_HEAP_OPTS: "-Xms128M -Xmx256M"
    ports:
      - "19092:19092"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - electromart-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: electromart-schema-registry
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_HEAP_OPTS: "-Xms64M -Xmx128M"
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - electromart-network

  schema-registry-init:
    build:
      context: ./services/schema-registry-init
      dockerfile: Dockerfile
    container_name: electromart-schema-registry-init
    environment:
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    depends_on:
      schema-registry:
        condition: service_healthy
    networks:
      - electromart-network

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: electromart-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: electromart
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      JAVA_OPTS: "-Xms64M -Xmx128M"
    ports:
      - "8888:8080"
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - electromart-network

  kafka-connect:
    image: debezium/connect:2.5
    container_name: electromart-kafka-connect
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: electromart-connect
      CONFIG_STORAGE_TOPIC: _connect-configs
      OFFSET_STORAGE_TOPIC: _connect-offsets
      STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_SCHEDULED_REBALANCE_MAX_DELAY_MS: "0"
      HEAP_OPTS: "-Xms512M -Xmx1G"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - electromart-network

  postgres-connector-source:
    build:
      context: ./services/postgres-connector-source
      dockerfile: Dockerfile
    container_name: electromart-postgres-connector-source
    environment:
      KAFKA_CONNECT_URL: http://kafka-connect:8083
      CONNECTOR_NAME: postgres-connector
      DB_HOST: postgres
      DB_USER: electromart
      DB_PASSWORD: electromart123
      DB_NAME: electromart
      OTEL_SERVICE_NAME: postgres-connector-source
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      JAVA_OPTS: "-javaagent:/app/opentelemetry-javaagent.jar -Xms16M -Xmx32M"
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - electromart-network

  postgres-enricher:
    build:
      context: ./services/postgres-enricher
      dockerfile: Dockerfile
    container_name: electromart-postgres-enricher
    environment:
      KAFKA_BROKER: kafka:9092
      DEBEZIUM_PREFIX: electromart.public
      TOPIC_OUTPUT: raw_postgres
      TOPIC_DLQ: raw_postgres-dlq
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCHEMA_REGISTRY_VERSION: "1"
      OTEL_SERVICE_NAME: postgres-enricher
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      JAVA_OPTS: "-javaagent:/app/opentelemetry-javaagent.jar -Xms32M -Xmx64M"
    depends_on:
      schema-registry-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    networks:
      - electromart-network

  csv-connector-source:
    build:
      context: ./services/csv-connector-source
      dockerfile: Dockerfile
    container_name: electromart-csv-connector
    environment:
      KAFKA_BROKER: kafka:9092
      TOPIC_OUTPUT: raw_csv
      TOPIC_DLQ: raw_csv-dlq
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: sales-csv
      MINIO_PROCESSED_BUCKET: sales-csv-processed
      WEBHOOK_PORT: "8085"
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCHEMA_REGISTRY_VERSION: "1"
      OTEL_SERVICE_NAME: csv-connector-source
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      JAVA_OPTS: "-javaagent:/app/opentelemetry-javaagent.jar -Xms64M -Xmx128M"
    ports:
      - "8085:8085"
    depends_on:
      schema-registry-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    networks:
      - electromart-network

  soap-connector-source:
    build:
      context: ./services/soap-connector-source
      dockerfile: Dockerfile
    container_name: electromart-soap-connector
    environment:
      KAFKA_BROKER: kafka:9092
      TOPIC_OUTPUT: raw_soap
      TOPIC_DLQ: raw_soap-dlq
      SOAP_URL: http://soap-service:8080/sales
      PAGE_SIZE: "100"
      POLL_INTERVAL: "5000"
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCHEMA_REGISTRY_VERSION: "1"
      OTEL_SERVICE_NAME: soap-connector-source
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      JAVA_OPTS: "-javaagent:/app/opentelemetry-javaagent.jar -Xms32M -Xmx64M"
    ports:
      - "8087:8087"
    depends_on:
      schema-registry-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    networks:
      - electromart-network

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: electromart-timescaledb
    environment:
      POSTGRES_USER: sales
      POSTGRES_PASSWORD: sales123
      POSTGRES_DB: salesdb
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./services/sales-aggregator/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales -d salesdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - electromart-network

  sales-aggregator:
    build:
      context: ./services/sales-aggregator
      dockerfile: Dockerfile
    container_name: electromart-sales-aggregator
    environment:
      KAFKA_BROKER: kafka:9092
      TOPIC_RAW_CSV: raw_csv
      TOPIC_RAW_SOAP: raw_soap
      TOPIC_RAW_POSTGRES: raw_postgres
      TOPIC_SALES: sales
      TOPIC_DLQ: sales-dlq
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      OTEL_SERVICE_NAME: sales-aggregator
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      JAVA_OPTS: "-javaagent:/app/opentelemetry-javaagent.jar -Xms32M -Xmx64M"
    depends_on:
      schema-registry:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - electromart-network

  sales-consumer:
    build:
      context: ./services/sales-consumer
      dockerfile: Dockerfile
    container_name: electromart-sales-consumer
    environment:
      PORT: "8090"
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC_SALES: sales
      KAFKA_GROUP_ID: timescale-sales-writer
      TIMESCALEDB_HOST: timescaledb
      TIMESCALEDB_PORT: 5432
      TIMESCALEDB_USER: sales
      TIMESCALEDB_PASSWORD: sales123
      TIMESCALEDB_DATABASE: salesdb
      OTEL_SERVICE_NAME: sales-consumer
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      OTEL_INSTRUMENTATION_MESSAGING_EXPERIMENTAL_RECEIVE_TELEMETRY_ENABLED: "false"
      JAVA_OPTS: "-javaagent:/app/opentelemetry-javaagent.jar -Xms32M -Xmx64M"
    ports:
      - "8090:8090"
      - "8086:8086"
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - electromart-network

  grafana:
    image: grafana/grafana:10.3.1
    container_name: electromart-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/sales-dashboard.json
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/grafana/provisioning:/etc/grafana/provisioning
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      timescaledb:
        condition: service_healthy
      prometheus:
        condition: service_started
    networks:
      - electromart-network

  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: electromart-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    volumes:
      - ./services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - electromart-network

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: electromart-kafka-exporter
    command:
      - "--kafka.server=kafka:9092"
      - "--topic.filter=.*"
      - "--group.filter=.*"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - electromart-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: electromart-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://electromart:electromart123@postgres:5432/electromart?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - electromart-network

  timescaledb-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: electromart-timescaledb-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://sales:sales123@timescaledb:5432/salesdb?sslmode=disable"
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - electromart-network

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: electromart-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317"
    networks:
      - electromart-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: electromart-otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./services/otel-collector/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      jaeger:
        condition: service_started
    networks:
      - electromart-network

volumes:
  postgres_data:
  minio_data:
  timescaledb_data:
  grafana_data:
  kafka_data:
  prometheus_data:

networks:
  electromart-network:
    driver: bridge
